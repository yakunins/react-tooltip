<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo — Contemporary React Tooltip</title>
    <link rel="icon" type="image/png" href="favicon-tooltip.png" />
    <link rel="stylesheet" href="style.css" />

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.2.7",
          "react-dom": "https://esm.sh/react-dom@19.2.7",
          "react-dom/client": "https://esm.sh/react-dom@19.2.7/client",
          "react/jsx-runtime": "https://esm.sh/react@19.2.7/jsx-runtime",
          "htm": "https://esm.sh/htm@3.1.1",
          "react-tooltip-contemporary": "https://esm.sh/react-tooltip-contemporary@0.1.1?external=react,react-dom"
        }
      }
    </script>
  </head>
  <body>
    <header class="header">
      <h1>Contemporary React Tooltip</h1>
      <span class="spacer"></span>
      <a href="https://www.npmjs.com/package/react-tooltip-contemporary">npm</a>
      <a href="https://github.com/yakunins/react-tooltip">GitHub</a>
    </header>

    <div id="root"></div>

    <script type="module">
      import React, { useState, useMemo, useEffect } from 'react';
      import { createRoot } from 'react-dom/client';
      import htm from 'htm';
      import { Tooltip } from 'react-tooltip-contemporary';

      const html = htm.bind(React.createElement);

      // ---- defaults (mirror the library defaults) ----
      const DEFAULTS = {
        content:
          'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.',
        placement: 'top',
        arrowPlacement: 'center',
        triggers: { hover: true, focus: true, click: true },
        offset: '0.25em',
        autoFlip: true,
        defaultOpen: true,
        open: false,
        delayShow: 200,
        delayHide: 100,
        // bubbleStyle
        background: '#000000',
        color: '#ffffff',
        fontSize: '0.875rem',
        radius: '0.5rem',
        arrowSize: '0.5rem',
        paddingX: '0.7rem',
        paddingY: '0.4rem',
        maxWidth: '16rem',
        transitionDuration: '0.2s',
        cornerSegments: 5,
      };

      // ---- small control components ----
      function Select({ label, value, options, onChange }) {
        return html`
          <div class="field">
            <label>${label}</label>
            <select value=${value} onChange=${e => onChange(e.target.value)}>
              ${options.map(
                o => html`<option key=${o} value=${o}>${o}</option>`
              )}
            </select>
          </div>
        `;
      }

      function TextField({ label, value, onChange, placeholder }) {
        return html`
          <div class="field">
            <label>${label}</label>
            <input
              type="text"
              value=${value}
              placeholder=${placeholder || ''}
              onChange=${e => onChange(e.target.value)}
            />
          </div>
        `;
      }

      function Color({ label, value, onChange }) {
        return html`
          <div class="field">
            <label>${label} <span class="val">${value}</span></label>
            <input
              type="color"
              value=${value}
              onChange=${e => onChange(e.target.value)}
            />
          </div>
        `;
      }

      function Range({ label, value, min, max, step, unit, onChange }) {
        return html`
          <div class="field">
            <label
              >${label} <span class="val">${value}${unit || ''}</span></label
            >
            <input
              type="range"
              min=${min}
              max=${max}
              step=${step}
              value=${value}
              onInput=${e => onChange(Number(e.target.value))}
            />
          </div>
        `;
      }

      function Segmented({ label, value, options, onChange }) {
        return html`
          <div class="field">
            <label>${label}</label>
            <div class="seg">
              ${options.map(
                o => html`
                  <label key=${o} class=${value === o ? 'on' : ''}>
                    <input
                      type="radio"
                      checked=${value === o}
                      onChange=${() => onChange(o)}
                    />
                    ${o}
                  </label>
                `
              )}
            </div>
          </div>
        `;
      }

      function Checks({ label, value, onChange }) {
        const keys = Object.keys(value);
        return html`
          <div class="field">
            <label>${label}</label>
            <div class="seg">
              ${keys.map(
                k => html`
                  <label key=${k} class=${value[k] ? 'on' : ''}>
                    <input
                      type="checkbox"
                      checked=${value[k]}
                      onChange=${e =>
                        onChange({ ...value, [k]: e.target.checked })}
                    />
                    ${k}
                  </label>
                `
              )}
            </div>
          </div>
        `;
      }

      function App() {
        const [s, setS] = useState(DEFAULTS);
        const set = patch => setS(p => ({ ...p, ...patch }));

        const triggerList = useMemo(
          () => ['hover', 'focus', 'click'].filter(k => s.triggers[k]),
          [s.triggers]
        );

        const fullBubble = useMemo(
          () => ({
            background: s.background,
            color: s.color,
            fontSize: s.fontSize,
            radius: s.radius,
            arrowSize: s.arrowSize,
            paddingX: s.paddingX,
            paddingY: s.paddingY,
            maxWidth: s.maxWidth,
            transitionDuration: s.transitionDuration,
            cornerSegments: s.cornerSegments,
          }),
          [s]
        );

        const tip = children =>
          html`<${Tooltip}
            key=${'open-' + s.defaultOpen}
            content=${s.content}
            placement=${s.placement}
            arrowPlacement=${s.arrowPlacement}
            trigger=${triggerList.length ? triggerList : ['hover']}
            offset=${s.offset}
            autoFlip=${s.autoFlip}
            defaultOpen=${s.defaultOpen}
            open=${s.open || undefined}
            onOpenChange=${v => set({ open: v })}
            timings=${{ delayShow: s.delayShow, delayHide: s.delayHide }}
            bubbleStyle=${fullBubble}
            >${children}<//
          >`;

        // ---- center the scrollable stage on the trigger initially ----
        const stageRef = React.useRef(null);
        useEffect(() => {
          const el = stageRef.current;
          if (!el) return;
          el.scrollLeft = (el.scrollWidth - el.clientWidth) / 2;
          el.scrollTop = (el.scrollHeight - el.clientHeight) / 2;
        }, []);

        return html`
          <div class="layout">
            <aside class="controls">
              <${TextField}
                label="content"
                value=${s.content}
                onChange=${v => set({ content: v })}
              />

              <${Segmented}
                label="placement"
                value=${s.placement}
                options=${['top', 'bottom', 'left', 'right']}
                onChange=${v => set({ placement: v })}
              />
              <${Segmented}
                label="arrowPlacement"
                value=${s.arrowPlacement}
                options=${['start', 'center', 'end']}
                onChange=${v => set({ arrowPlacement: v })}
              />
              <${Checks}
                label="trigger"
                value=${s.triggers}
                onChange=${v => set({ triggers: v })}
              />
              <${TextField}
                label="offset (CSS length)"
                value=${s.offset}
                onChange=${v => set({ offset: v })}
              />
              <div class="grid3">
                <div class="field row">
                  <input
                    type="checkbox"
                    id="autoflip"
                    checked=${s.autoFlip}
                    onChange=${e => set({ autoFlip: e.target.checked })}
                  />
                  <label for="autoflip">autoFlip</label>
                </div>
                <div class="field row">
                  <input
                    type="checkbox"
                    id="defaultopen"
                    checked=${s.defaultOpen}
                    onChange=${e => set({ defaultOpen: e.target.checked })}
                  />
                  <label for="defaultopen">defaultOpen</label>
                </div>
                <div class="field row">
                  <input
                    type="checkbox"
                    id="open"
                    checked=${s.open}
                    onChange=${e => set({ open: e.target.checked })}
                  />
                  <label for="open">open</label>
                </div>
              </div>
              <br />
              <${Range}
                label="delayShow"
                value=${s.delayShow}
                min=${0}
                max=${1000}
                step=${50}
                unit="ms"
                onChange=${v => set({ delayShow: v })}
              />
              <${Range}
                label="delayHide"
                value=${s.delayHide}
                min=${0}
                max=${1000}
                step=${50}
                unit="ms"
                onChange=${v => set({ delayHide: v })}
              />

              <div class="grid3">
                <${Color}
                  label="bg"
                  value=${s.background}
                  onChange=${v => set({ background: v })}
                />
                <${Color}
                  label="color"
                  value=${s.color}
                  onChange=${v => set({ color: v })}
                />
                <${TextField}
                  label="fontSize"
                  value=${s.fontSize}
                  onChange=${v => set({ fontSize: v })}
                />
                <${TextField}
                  label="radius"
                  value=${s.radius}
                  onChange=${v => set({ radius: v })}
                />
                <${TextField}
                  label="arrowSize"
                  value=${s.arrowSize}
                  onChange=${v => set({ arrowSize: v })}
                />
                <${TextField}
                  label="paddingX"
                  value=${s.paddingX}
                  onChange=${v => set({ paddingX: v })}
                />
                <${TextField}
                  label="paddingY"
                  value=${s.paddingY}
                  onChange=${v => set({ paddingY: v })}
                />
                <${TextField}
                  label="maxWidth"
                  value=${s.maxWidth}
                  onChange=${v => set({ maxWidth: v })}
                />
                <${TextField}
                  label="transitionDuration"
                  value=${s.transitionDuration}
                  onChange=${v => set({ transitionDuration: v })}
                />
                <${Range}
                  label="cornerSegments"
                  value=${s.cornerSegments}
                  min=${3}
                  max=${7}
                  step=${2}
                  onChange=${v => set({ cornerSegments: v })}
                />
              </div>

              <button class="reset" onClick=${() => setS(DEFAULTS)}>
                Reset to defaults
              </button>
            </aside>

            <main class="stage-wrap">
              <div class="stage" ref=${stageRef}>
                <div class="stage-canvas">
                  ${tip(
                    html`<div class="demo-anchor">
                      Click, focus, or hover me
                    </div>`
                  )}
                </div>
              </div>
            </main>
          </div>
        `;
      }

      createRoot(document.getElementById('root')).render(html`<${App} />`);
    </script>
  </body>
</html>
