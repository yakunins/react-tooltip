<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo — Contemporary React Tooltip</title>
    <link rel="icon" type="image/png" href="favicon-tooltip.png" />
    <link rel="stylesheet" href="style.css" />

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.2.7",
          "react-dom": "https://esm.sh/react-dom@19.2.7",
          "react-dom/client": "https://esm.sh/react-dom@19.2.7/client",
          "react/jsx-runtime": "https://esm.sh/react@19.2.7/jsx-runtime",
          "htm": "https://esm.sh/htm@3.1.1",
          "react-tooltip-contemporary": "https://esm.sh/react-tooltip-contemporary@0.1.0?external=react,react-dom"
        }
      }
    </script>
  </head>
  <body>
    <header class="header">
      <h1><code>&lt;Tooltip /&gt;</code> — Contemporary React Tooltip</h1>
      <span class="spacer"></span>
      <a href="https://www.npmjs.com/package/react-tooltip-contemporary">npm</a>
      <a href="https://github.com/yakunins/react-tooltip">GitHub</a>
    </header>

    <div id="root"></div>

    <script type="module">
      import React, { useState, useMemo } from 'react';
      import { createRoot } from 'react-dom/client';
      import htm from 'htm';
      import { Tooltip } from 'react-tooltip-contemporary';

      const html = htm.bind(React.createElement);

      // ---- defaults (mirror the library defaults) ----
      const DEFAULTS = {
        content: 'Saved to your library',
        placement: 'top',
        arrowPlacement: 'center',
        triggers: { hover: true, focus: true, click: false },
        offset: '0.25em',
        autoFlip: true,
        delayShow: 200,
        delayHide: 100,
        // bubbleStyle
        background: '#000000',
        color: '#ffffff',
        fontSize: '0.875rem',
        radius: '0.5rem',
        arrowSize: '0.5rem',
        paddingX: '0.7rem',
        paddingY: '0.4rem',
        maxWidth: '16rem',
        transitionDuration: '0.2s',
        cornerSegments: 5,
      };

      // ---- small control components ----
      function Select({ label, value, options, onChange }) {
        return html`
          <div class="field">
            <label>${label}</label>
            <select value=${value} onChange=${e => onChange(e.target.value)}>
              ${options.map(
                o => html`<option key=${o} value=${o}>${o}</option>`
              )}
            </select>
          </div>
        `;
      }

      function TextField({ label, value, onChange, placeholder }) {
        return html`
          <div class="field">
            <label>${label}</label>
            <input
              type="text"
              value=${value}
              placeholder=${placeholder || ''}
              onChange=${e => onChange(e.target.value)}
            />
          </div>
        `;
      }

      function Color({ label, value, onChange }) {
        return html`
          <div class="field">
            <label>${label} <span class="val">${value}</span></label>
            <input
              type="color"
              value=${value}
              onChange=${e => onChange(e.target.value)}
            />
          </div>
        `;
      }

      function Range({ label, value, min, max, step, unit, onChange }) {
        return html`
          <div class="field">
            <label
              >${label} <span class="val">${value}${unit || ''}</span></label
            >
            <input
              type="range"
              min=${min}
              max=${max}
              step=${step}
              value=${value}
              onInput=${e => onChange(Number(e.target.value))}
            />
          </div>
        `;
      }

      function Segmented({ label, value, options, onChange }) {
        return html`
          <div class="field">
            <label>${label}</label>
            <div class="seg">
              ${options.map(
                o => html`
                  <label key=${o} class=${value === o ? 'on' : ''}>
                    <input
                      type="radio"
                      checked=${value === o}
                      onChange=${() => onChange(o)}
                    />
                    ${o}
                  </label>
                `
              )}
            </div>
          </div>
        `;
      }

      function Checks({ label, value, onChange }) {
        const keys = Object.keys(value);
        return html`
          <div class="field">
            <label>${label}</label>
            <div class="seg">
              ${keys.map(
                k => html`
                  <label key=${k} class=${value[k] ? 'on' : ''}>
                    <input
                      type="checkbox"
                      checked=${value[k]}
                      onChange=${e =>
                        onChange({ ...value, [k]: e.target.checked })}
                    />
                    ${k}
                  </label>
                `
              )}
            </div>
          </div>
        `;
      }

      function App() {
        const [s, setS] = useState(DEFAULTS);
        const set = patch => setS(p => ({ ...p, ...patch }));

        const triggerList = useMemo(
          () => ['hover', 'focus', 'click'].filter(k => s.triggers[k]),
          [s.triggers]
        );

        const fullBubble = useMemo(
          () => ({
            background: s.background,
            color: s.color,
            fontSize: s.fontSize,
            radius: s.radius,
            arrowSize: s.arrowSize,
            paddingX: s.paddingX,
            paddingY: s.paddingY,
            maxWidth: s.maxWidth,
            transitionDuration: s.transitionDuration,
            cornerSegments: s.cornerSegments,
          }),
          [s]
        );

        const tip = children =>
          html`<${Tooltip}
            content=${s.content}
            placement=${s.placement}
            arrowPlacement=${s.arrowPlacement}
            trigger=${triggerList.length ? triggerList : ['hover']}
            offset=${s.offset}
            autoFlip=${s.autoFlip}
            timings=${{ delayShow: s.delayShow, delayHide: s.delayHide }}
            bubbleStyle=${fullBubble}
            >${children}<//
          >`;

        // ---- draggable trigger inside the stage ----
        const stageRef = React.useRef(null);
        const drag = React.useRef({ active: false, offX: 0, offY: 0 });
        const [pos, setPos] = useState(null); // null => centered

        const dragStyle =
          pos === null
            ? { left: '50%', top: '50%', transform: 'translate(-50%, -50%)' }
            : { left: pos.x + 'px', top: pos.y + 'px' };

        const onPointerDown = e => {
          const r = e.currentTarget.getBoundingClientRect();
          drag.current = {
            active: true,
            offX: e.clientX - r.left,
            offY: e.clientY - r.top,
          };
          e.currentTarget.setPointerCapture(e.pointerId);
        };
        const onPointerMove = e => {
          if (!drag.current.active) return;
          const stage = stageRef.current.getBoundingClientRect();
          const w = e.currentTarget.offsetWidth;
          const h = e.currentTarget.offsetHeight;
          const x = Math.max(
            0,
            Math.min(e.clientX - stage.left - drag.current.offX, stage.width - w)
          );
          const y = Math.max(
            0,
            Math.min(e.clientY - stage.top - drag.current.offY, stage.height - h)
          );
          setPos({ x, y });
        };
        const onPointerUp = e => {
          drag.current.active = false;
          e.currentTarget.releasePointerCapture(e.pointerId);
        };

        return html`
          <div class="layout">
            <aside class="controls">
              <h2>Content</h2>
              <${TextField}
                label="content"
                value=${s.content}
                onChange=${v => set({ content: v })}
              />

              <h2>Behaviour</h2>
              <${Segmented}
                label="placement"
                value=${s.placement}
                options=${['top', 'bottom', 'left', 'right']}
                onChange=${v => set({ placement: v })}
              />
              <${Segmented}
                label="arrowPlacement"
                value=${s.arrowPlacement}
                options=${['start', 'center', 'end']}
                onChange=${v => set({ arrowPlacement: v })}
              />
              <${Checks}
                label="trigger"
                value=${s.triggers}
                onChange=${v => set({ triggers: v })}
              />
              <${TextField}
                label="offset (CSS length)"
                value=${s.offset}
                onChange=${v => set({ offset: v })}
              />
              <div class="field row">
                <input
                  type="checkbox"
                  id="autoflip"
                  checked=${s.autoFlip}
                  onChange=${e => set({ autoFlip: e.target.checked })}
                />
                <label for="autoflip">autoFlip</label>
              </div>
              <${Range}
                label="delayShow"
                value=${s.delayShow}
                min=${0}
                max=${1000}
                step=${50}
                unit="ms"
                onChange=${v => set({ delayShow: v })}
              />
              <${Range}
                label="delayHide"
                value=${s.delayHide}
                min=${0}
                max=${1000}
                step=${50}
                unit="ms"
                onChange=${v => set({ delayHide: v })}
              />

              <h2>Bubble style</h2>
              <${Color}
                label="background"
                value=${s.background}
                onChange=${v => set({ background: v })}
              />
              <${Color}
                label="color"
                value=${s.color}
                onChange=${v => set({ color: v })}
              />
              <${TextField}
                label="fontSize"
                value=${s.fontSize}
                onChange=${v => set({ fontSize: v })}
              />
              <${TextField}
                label="radius"
                value=${s.radius}
                onChange=${v => set({ radius: v })}
              />
              <${TextField}
                label="arrowSize"
                value=${s.arrowSize}
                onChange=${v => set({ arrowSize: v })}
              />
              <${TextField}
                label="paddingX"
                value=${s.paddingX}
                onChange=${v => set({ paddingX: v })}
              />
              <${TextField}
                label="paddingY"
                value=${s.paddingY}
                onChange=${v => set({ paddingY: v })}
              />
              <${TextField}
                label="maxWidth"
                value=${s.maxWidth}
                onChange=${v => set({ maxWidth: v })}
              />
              <${TextField}
                label="transitionDuration"
                value=${s.transitionDuration}
                onChange=${v => set({ transitionDuration: v })}
              />
              <${Range}
                label="cornerSegments"
                value=${s.cornerSegments}
                min=${3}
                max=${7}
                step=${1}
                onChange=${v => set({ cornerSegments: v })}
              />

              <button class="reset" onClick=${() => setS(DEFAULTS)}>
                Reset to defaults
              </button>
            </aside>

            <main class="stage-wrap">
              <div class="stage" ref=${stageRef}>
                <div
                  class="drag"
                  style=${dragStyle}
                  onPointerDown=${onPointerDown}
                  onPointerMove=${onPointerMove}
                  onPointerUp=${onPointerUp}
                >
                  ${tip(html`<button class="demo-btn">Drag me</button>`)}
                </div>
              </div>
            </main>
          </div>
        `;
      }

      createRoot(document.getElementById('root')).render(html`<${App} />`);
    </script>
  </body>
</html>
